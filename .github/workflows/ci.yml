name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同一分支/PR 的旧运行被新 push 取消，省 runner 时间。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Release 构建 + 全量 ctest。
  # ---------------------------------------------------------------------------
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install GCC 13
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-13
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-gcc13
      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

  # ---------------------------------------------------------------------------
  # CI2:Sanitizer matrix（ASAN+UBSAN / TSan）。TSan 是 Barrier v2 / IndexPool
  # 并发协议 + 恢复期并行 fold/analyze 的唯一回归护栏；TSan 构建用源码编译的
  # 插桩 oneTBB（submodule recursive 已拉取）。运行期选项设为「首个错误即 abort
  # + 打栈」让 CI 失败确定可定位。
  # ---------------------------------------------------------------------------
  sanitizer:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        sanitizer: ["address,undefined", "thread"]
    env:
      ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1:print_stacktrace=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install GCC 13
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-13
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          # 按 sanitizer 分桶缓存（不同插桩 = 不同对象，含插桩 oneTBB）。
          key: san-${{ matrix.sanitizer }}-gcc13
      - name: Configure (${{ matrix.sanitizer }})
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBITCASK_SANITIZE=${{ matrix.sanitizer }} \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

  # ---------------------------------------------------------------------------
  # CI3:Benchmark 追踪。构建并跑 B1-B4 + 既有微基准，产出 JSON artifact 供
  # 人工/趋势比对。**非门控**——GitHub 共享 runner CPU 噪声大，自动 >10% 回归
  # 报警会频繁误报；artifact 留作离线比对（CI3 的自动回归检测维度留待专用稳定机）。
  # ---------------------------------------------------------------------------
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install GCC 13
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-13
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: bench-gcc13
      - name: Configure
        run: |
          cmake -S . -B build-bench \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBITCASK_BUILD_BENCHMARKS=ON \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build bench
        run: cmake --build build-bench -j$(nproc) --target bitcask_bench
      - name: Run benchmarks (JSON)
        run: |
          ./build-bench/bench/bitcask_bench \
            --benchmark_format=json \
            --benchmark_out=bench-results.json \
            --benchmark_min_time=0.2s
      - name: Upload bench artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: bench-results.json
          retention-days: 30
